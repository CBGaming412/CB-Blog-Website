<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CB Blog — A modern blog platform for sharing ideas, stories, and insights.">
    <title>CB Blog — Share Your Story</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ═══════════ NAVBAR ═══════════ -->
    <header class="navbar" id="navbar">
        <div class="navbar__container">
            <a href="#/" class="navbar__brand" id="nav-brand">
                <span class="navbar__logo-icon material-icons-round">edit_note</span>
                <span class="navbar__logo-text">CB<span class="accent">Blog</span></span>
            </a>

            <nav class="navbar__links" id="nav-links">
                <a href="#/" class="nav-link active" data-route="home" id="nav-home">
                    <span class="material-icons-round">home</span> Home
                </a>
                <a href="#/admin" class="nav-link admin-only" data-route="admin" id="nav-admin" style="display:none;">
                    <span class="material-icons-round">dashboard</span> Dashboard
                </a>
            </nav>

            <div class="navbar__actions">
                <button class="btn btn--ghost" id="btn-login" style="display:none;">
                    <span class="material-icons-round">login</span>
                    <span class="btn-label">Sign in with Google</span>
                </button>
                <div class="user-badge" id="user-badge" style="display:none;">
                    <img src="" alt="avatar" class="user-badge__avatar" id="user-avatar">
                    <span class="user-badge__name" id="user-name"></span>
                    <button class="btn btn--sm btn--outline" id="btn-logout" title="Sign out">
                        <span class="material-icons-round">logout</span>
                    </button>
                </div>
                <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main class="main" id="app">
        <!-- Dynamic content injected here by router -->
    </main>

    <!-- ═══════════ TOAST CONTAINER ═══════════ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ═══════════ FOOTER ═══════════ -->
    <footer class="footer" id="footer">
        <div class="footer__container">
            <div class="footer__brand">
                <span class="navbar__logo-icon material-icons-round">edit_note</span>
                <span class="navbar__logo-text">CB<span class="accent">Blog</span></span>
                <p class="footer__tagline">Sharing ideas, one post at a time.</p>
            </div>
            <div class="footer__links">
                <a href="#/">Home</a>
                <a href="#/admin">Dashboard</a>
            </div>
            <p class="footer__copy">&copy; 2026 CBBlog. All rights reserved.</p>
        </div>
    </footer>

    <!-- ═══════════ FIREBASE SDK (v9 compat) ═══════════ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- ═══════════ APP SCRIPTS ═══════════ -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
